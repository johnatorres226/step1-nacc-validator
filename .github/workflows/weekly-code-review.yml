name: Bi-weekly Automated Code Review

on:
  schedule:
    # Every Friday at 09:00 UTC — the job skips odd ISO weeks to achieve bi-weekly cadence
    - cron: '0 9 * * 5'
  workflow_dispatch:

jobs:
  create-review-issue:
    name: Open Copilot Code Review Issue
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Check bi-weekly cadence (even ISO weeks only)
        id: cadence
        run: |
          WEEK_NUM=$(date +'%V')
          echo "ISO week: $WEEK_NUM"
          if (( 10#$WEEK_NUM % 2 == 0 )); then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Odd week – skipping this cycle."
          fi

      - name: Get week identifier
        id: week
        if: steps.cadence.outputs.run == 'true'
        run: echo "label=$(date +'%Y-W%V')" >> "$GITHUB_OUTPUT"

      - name: Create bi-weekly code-review issue
        if: steps.cadence.outputs.run == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const week = '${{ steps.week.outputs.label }}';
            const title = `Bi-weekly Code Review – ${week}`;

            // --- Backlog guard: stop if too many unresolved review issues exist ---
            const BACKLOG_LIMIT = 3;
            const openReviews = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'automated-review',
              per_page: 100,
            });

            if (openReviews.data.length >= BACKLOG_LIMIT) {
              core.warning(
                `Backlog limit reached: ${openReviews.data.length} open "automated-review" ` +
                `issue(s) exist (limit is ${BACKLOG_LIMIT}). ` +
                `Resolve or close them before the next review cycle.`
              );
              return;
            }

            // Avoid duplicates if the workflow is re-run manually mid-week
            if (openReviews.data.some(i => i.title === title)) {
              core.info(`Issue "${title}" already exists – skipping.`);
              return;
            }

            const body = [
              '<!-- copilot-model: claude-sonnet-4.6 -->',
              '',
              '## Bi-weekly Automated Code Review',
              '',
              `**Period:** ${week}`,
              '',
              '@github-copilot Please review the changes merged since the last',
              'review cycle using the four engineering skills below.',
              '',
              '---',
              '',
              '### How to work through this review',
              '',
              'Apply each skill in order. For every finding you surface, **open a',
              'new issue or PR** — do not leave findings only as comments on this',
              'issue. Close this issue when all findings have been filed.',
              '',
              '#### 1 · diagnosing-bugs',
              'Scan for code paths that look broken, throw unexpectedly, or handle',
              'errors silently. For each candidate:',
              '- Build (or describe) a minimal feedback loop that would turn red on',
              '  the bug (failing test, CLI invocation, curl script).',
              '- Reproduce → minimise → hypothesise → propose a fix.',
              '- File a bug issue with: symptom, reproduction steps, and proposed fix.',
              '',
              '#### 2 · tdd',
              'Identify behaviours that lack test coverage or are tested through',
              'implementation details (mocked internals, private methods).',
              '- Flag tests that would survive refactoring vs. ones that would not.',
              '- Propose missing tests as vertical slices (one behaviour at a time).',
              '- File an issue for each coverage gap; open a PR if the fix is small.',
              '',
              '#### 3 · domain-modeling',
              'Check terminology consistency across code, comments, and docs.',
              '- Surface overloaded or ambiguous terms (e.g. "record" vs. "visit").',
              '- Propose precise canonical names; cross-reference with `CONTEXT.md`',
              '  if it exists.',
              '- File an issue for each terminology inconsistency.',
              '',
              '#### 4 · codebase-design',
              'Look for shallow modules, leaky interfaces, and missed deepening',
              'opportunities.',
              '- Apply the deletion test: does complexity vanish or spread to callers?',
              '- Flag interfaces that are nearly as complex as their implementation.',
              '- Suggest where seams belong and which adapters would make code',
              '  easier to test and maintain.',
              '- File an issue (or PR) for each design improvement.',
              '',
              '---',
              '',
              '**Output contract:** every finding → a new issue or PR.',
              'No stray prose findings in this thread.',
            ].join('\n');

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['automated-review'],
              assignees: ['copilot'],
            });

            core.info(`Created issue #${issue.data.number}: ${issue.data.html_url}`);
