[mypy]
ignore_missing_imports = True
no_implicit_optional = True
warn_return_any = False
warn_unused_ignores = False
# Disable warnings for untyped imports from third-party packages
disable_error_code = import-untyped

# Exclude third-party code and build artifacts from type checking
exclude = (?x)(
    ^nacc_form_validator/
    | ^build/
    | ^dist/
    | ^\.venv/
    | ^\.pytest_cache/
    | ^__pycache__/
    )

# Relax some checks for third-party modules
[mypy-nacc_form_validator.*]
ignore_errors = True

[mypy-requests.*]
ignore_missing_imports = True
